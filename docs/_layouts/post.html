---
layout: blog
---
<article class="post">
  <p class="eyebrow">The Rollout</p>
  <h1>{{ page.title }}</h1>
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
  {{ content }}
  <p class="post-back"><a href="{{ '/blog/' | relative_url }}">&larr; The Rollout</a></p>
</article>
