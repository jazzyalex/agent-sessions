# Site config for jazzyalex.github.io/agent-sessions (GitHub Pages, legacy Jekyll build).
# Existing HTML pages have no front matter and pass through byte-identical.
# This config adds "The Rollout" blog (/blog/) and stops internal docs from being served.
title: Agent Sessions
description: >-
  Local history, search, and usage tracking for AI coding agents on macOS —
  Codex, Claude Code, Cursor, OpenCode, Copilot, and more.
url: "https://jazzyalex.github.io"
baseurl: "/agent-sessions"
timezone: America/Los_Angeles
encoding: utf-8

# Social cards (jekyll-seo-tag). Posts set their own `image:`; this is the
# default handle + card type so links render a large-image card on X/LinkedIn.
twitter:
  username: jazzyalex
  card: summary_large_image

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Posts render at /blog/<slug>/
permalink: /blog/:title/

defaults:
  - scope:
      type: posts
    values:
      layout: post
      image: /assets/marketing/screenshots/agent-sessions-codex-claude-history.png

# MUST KEEP SERVED (never add to exclude): index.html, appcast.xml (Sparkle
# SUFeedURL — breaking this breaks auto-update), assets/, guides/, blog/.
#
# NOTE: on the Pages Jekyll (3.x) this list REPLACES the built-in defaults,
# so the tooling entries are repeated here explicitly.
exclude:
  # build tooling
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  # internal directories (specs, plans, ops docs, mockups)
  - adr
  - agent-support
  - analytics
  - deep-dive
  - mockups
  - plans
  - release
  - schemas
  - snippets
  - summaries
  - superpowers
  - updates
  - vision
  # internal root-level mockups (never linked from any live page)
  - cockpit-mockup.html
  - cockpit-hud-mockup.html
  # root-level internal markdown. Enumerated deliberately: a bare "*.md" glob
  # on Pages Jekyll 3.x ALSO matches _posts/*.md and silently drops every blog
  # post. Excluding a named .md also suppresses its optional-front-matter .html.
  # A new root .md leaks until added here — the deploy manifest gate (.md count
  # must be 0) catches that before publish.
  - "CHANGELOG.md"
  - "CONTRIBUTING.md"
  - "Energy-and-Performance.md"
  - "perf-2026-07-12-runway-idle-fix.md"
  - "Ghostty-support-v1.md"
  - "PRIVACY.md"
